<!DOCTYPE html>
<html>
  <head>
    <style>
  body {
    margin: 0;
    background: radial-gradient(circle at top, #061a33, #000814 70%);
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }

  .stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(2px 2px at 20% 30%, white, transparent),
      radial-gradient(1px 1px at 80% 20%, white, transparent),
      radial-gradient(2px 2px at 60% 70%, white, transparent),
      radial-gradient(1px 1px at 30% 80%, white, transparent),
      radial-gradient(2px 2px at 90% 60%, white, transparent);
    background-size: 300px 300px;
    animation: drift 80s linear infinite;
    opacity: 0.7;
  }

  @keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-300px); }
  }

  .earth {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset -40px -40px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(0,150,255,0.4);
    background:
      url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
    background-size: cover;
    animation:
      spin 20s linear infinite;
  }

  .earth::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
      rgba(255,255,255,0.35),
      transparent 45%);
  }

  @keyframes spin {
    from {
      background-position: 0 0;
    }
    to {
      background-position: 600px 0;
    }
  }

  .title {
    position: absolute;
    bottom: 30px;
    color: white;
    font-size: 24px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
  }
    </style>
  </head>
<body>
<p>make me into art</p>
  <div class="stars"></div>

<div class="earth"></div>

<div class="title">Planet Earth</div>
  
</body>
</html>
